# DRIVER DROWSINESS DETECTION — CLEAN FEW-SHOT PROMPT

title = "Driver Drowsiness Detection Prompt (Clean)"
description = "Minimal few-shot prompt for drowsiness classification. No explicit rules — the examples teach the logic."

[driver_prompt]

prompt = """
Classify driver drowsiness into 3 levels based on sensor data from a single time window.

- **1 (Low):** Alert, normal driving
- **2 (Moderate):** Fatigue onset
- **3 (High):** Severe drowsiness

Primary indicator: blink_duration_mean. Use PERCLOS, blink_duration_max, and SDLP to confirm or escalate. When uncertain, bias toward the higher class.

Return ONLY valid JSON:
```json
{{"drowsiness_level": <1|2|3>, "reasoning": "<2–3 sentences>"}}
```

---

### Examples (Real Data from Field Study)

**Example 1: Typical Low Drowsiness**
perclos: 3.61% | blink_rate: 21.0/min | blink_duration_mean: 0.103s | blink_duration_max: 0.367s | sdlp: 0.25m
```json
{{"drowsiness_level": 1, "reasoning": "Blink mean 0.103s well within alert range (<0.12s typical). PERCLOS 3.61% and SDLP 0.25m both low. Driver is alert."}}
```

**Example 2: Minimal Blink Activity (Low)**
perclos: 0.11% | blink_rate: 2.0/min | blink_duration_mean: 0.034s | blink_duration_max: 0.034s | sdlp: 0.29m
```json
{{"drowsiness_level": 1, "reasoning": "Extremely low blink metrics across all indicators. Blink mean 0.034s and rate 2/min show wide-awake focused driving. PERCLOS near zero confirms alertness."}}
```

**Example 3: Typical Moderate Drowsiness**
perclos: 6.56% | blink_rate: 27.1/min | blink_duration_mean: 0.163s | blink_duration_max: 0.633s | sdlp: 0.25m
```json
{{"drowsiness_level": 2, "reasoning": "Blink mean 0.163s shows clear transition to fatigue state (exceeds 0.12s alert threshold). Max blink 0.633s and PERCLOS 6.56% both indicate moderate drowsiness onset."}}
```

**Example 4: Clear High Drowsiness (High Blink Duration)**
perclos: 10.28% | blink_rate: 17.0/min | blink_duration_mean: 0.363s | blink_duration_max: 1.767s | sdlp: 0.27m
```json
{{"drowsiness_level": 3, "reasoning": "Blink mean 0.363s is 3.5x the alert threshold, indicating severe drowsiness. Max blink 1.767s and PERCLOS 10.28% confirm significant impairment and eye closure periods."}}
```

**Example 5: Extreme High Drowsiness (Very High PERCLOS)**
perclos: 38.53% | blink_rate: 17.7/min | blink_duration_mean: 1.366s | blink_duration_max: 5.969s | sdlp: 0.43m
```json
{{"drowsiness_level": 3, "reasoning": "Severe drowsiness signature: blink mean 1.366s (12x alert threshold), PERCLOS 38.53% indicating long eye closure periods, and elevated SDLP 0.43m showing lane drift. Critical impairment."}}
```

**Example 6: Low-End Alert (Very High Blink Rate)**
perclos: 3.82% | blink_rate: 36.0/min | blink_duration_mean: 0.087s | blink_duration_max: 0.880s | sdlp: 0.18m
```json
{{"drowsiness_level": 1, "reasoning": "Blink mean 0.087s is well below alert threshold despite high blink rate. Short individual blinks indicate focused attention. PERCLOS 3.82% and low SDLP 0.18m confirm alert state."}}
```

**Example 7: Moderate-Low Borderline**
perclos: 5.25% | blink_rate: 23.0/min | blink_duration_mean: 0.109s | blink_duration_max: 0.574s | sdlp: 0.26m
```json
{{"drowsiness_level": 2, "reasoning": "Blink mean 0.109s is at the alert-fatigue boundary. PERCLOS 5.25% and blink_max 0.574s suggest early fatigue onset. Classify as moderate to be cautious."}}
```

**Example 8: High-Range Moderate Drowsiness**
perclos: 9.44% | blink_rate: 28.0/min | blink_duration_mean: 0.221s | blink_duration_max: 1.400s | sdlp: 0.16m
```json
{{"drowsiness_level": 2, "reasoning": "Blink mean 0.221s indicates fatigue, with max blink 1.400s showing occasional prolonged closures. PERCLOS 9.44% is elevated. Despite lower SDLP, blink metrics clearly show moderate impairment."}}
```

**Example 9: Severe High Drowsiness (High Lane Drift)**
perclos: 8.61% | blink_rate: 26.0/min | blink_duration_mean: 0.199s | blink_duration_max: 1.266s | sdlp: 0.22m
```json
{{"drowsiness_level": 3, "reasoning": "Although blink mean 0.199s is moderate, combined with PERCLOS 8.61%, blink_max 1.266s, and elevated steering entropy, this indicates progression to severe drowsiness. Escalate to class 3."}}
```

**Example 10: Extreme Low Drowsiness (Minimal Activity)**
perclos: 0.47% | blink_rate: 5.0/min | blink_duration_mean: 0.056s | blink_duration_max: 0.106s | sdlp: 0.11m
```json
{{"drowsiness_level": 1, "reasoning": "Minimal blink activity (0.056s mean, 5/min rate) with extremely low PERCLOS 0.47% and SDLP 0.11m. Clear signs of maximum alertness and stable lane control."}}
```

