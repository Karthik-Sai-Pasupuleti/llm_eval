### New Input

<window_id>{window_id}</window_id>
<vision_features>
perclos: {perclos:.2f}% | blink_rate: {blink_rate:.1f}/min | blink_duration_mean: {blink_duration_mean:.3f}s | blink_duration_max: {blink_duration_max:.3f}s | yawning_rate: {yawning_rate:.1f}/min
</vision_features>
<lane_features>sdlp: {sdlp:.2f}m</lane_features>
<steering_features>steering_entropy: {steering_entropy:.2f} | steering_reversal_rate: {steering_reversal_rate:.2f}/sec</steering_features>
<heart_rate_features>hrv_rmssd: {hrv_rmssd:.2f}ms | hrv_sd1: {hrv_sd1:.2f}ms</heart_rate_features>

Output JSON only:
"""